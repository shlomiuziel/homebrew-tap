name: Update Formula

on:
  workflow_dispatch:
    inputs:
      repository:
        description: "Source repository, e.g. shlomiuziel/sonosh"
        required: true
        type: string
      tag:
        description: "Release tag, e.g. v1.2.3"
        required: true
        type: string
      helper_arm64_url:
        description: "macOS arm64 helper tarball URL"
        required: true
        type: string
      helper_arm64_sha256:
        description: "macOS arm64 helper tarball SHA-256"
        required: true
        type: string
      helper_amd64_url:
        description: "macOS amd64 helper tarball URL"
        required: true
        type: string
      helper_amd64_sha256:
        description: "macOS amd64 helper tarball SHA-256"
        required: true
        type: string

permissions:
  contents: write

jobs:
  update-formula:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update formula from release
        env:
          REPOSITORY: ${{ inputs.repository }}
          TAG: ${{ inputs.tag }}
          HELPER_ARM64_URL: ${{ inputs.helper_arm64_url }}
          HELPER_ARM64_SHA256: ${{ inputs.helper_arm64_sha256 }}
          HELPER_AMD64_URL: ${{ inputs.helper_amd64_url }}
          HELPER_AMD64_SHA256: ${{ inputs.helper_amd64_sha256 }}
        run: |
          set -euo pipefail

          version="${TAG#v}"
          tarball="https://github.com/${REPOSITORY}/archive/refs/tags/${TAG}.tar.gz"
          tmpdir="$(mktemp -d)"
          archive="${tmpdir}/source.tar.gz"

          curl -fsSL "$tarball" -o "$archive"
          sha256="$(shasum -a 256 "$archive" | awk '{print $1}')"

          ruby - "$version" "$tarball" "$sha256" \
            "$HELPER_ARM64_URL" "$HELPER_ARM64_SHA256" \
            "$HELPER_AMD64_URL" "$HELPER_AMD64_SHA256" <<'RUBY'
          version, url, sha256, helper_arm64_url, helper_arm64_sha256, helper_amd64_url, helper_amd64_sha256 = ARGV
          path = "Formula/sonosh.rb"
          text = File.read(path)
          text = text.sub(/^  url ".*"$/, "  url \"#{url}\"")
          text = text.sub(/^  sha256 .*$/, "  sha256 \"#{sha256}\"")
          text = text.sub(/^  version ".*"$/, "  version \"#{version}\"")
          text = text.sub(
            /^  resource "sonosh-helper-darwin-arm64" do\n.*?\n  end\n/m,
            "  resource \"sonosh-helper-darwin-arm64\" do\n    url \"#{helper_arm64_url}\"\n    sha256 \"#{helper_arm64_sha256}\"\n  end\n"
          )
          text = text.sub(
            /^  resource "sonosh-helper-darwin-amd64" do\n.*?\n  end\n/m,
            "  resource \"sonosh-helper-darwin-amd64\" do\n    url \"#{helper_amd64_url}\"\n    sha256 \"#{helper_amd64_sha256}\"\n  end\n"
          )
          File.write(path, text)
          RUBY

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/sonosh.rb
          git commit -m "Update sonosh formula to ${TAG}" || exit 0
          git push
